name: "Debugging Tasks"
description: "Trace bugs through code"

tasks:
  - id: "debug-status-tool"
    prompt: "Debug: The mcp_status tool sometimes returns empty results. Trace through the code to find why."
    expected:
      - "src/mcp/handler.rs"
      - "mcp_status"

  - id: "debug-indexing-failure"
    prompt: "Debug: Indexing fails silently for some files. Find where the error handling might be missing."
    expected:
      - "src/indexer/"

  - id: "debug-query-edge"
    prompt: "Debug: get_dependencies returns incorrect results for nested imports. Trace the query flow."
    expected:
      - "src/graph/query.rs"
