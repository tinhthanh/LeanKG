name: "Code Navigation Tasks"
description: "Find files, functions, understand structure"

tasks:
  - id: "find-mcp-handler"
    prompt: "Find the MCP server handler in LeanKG without using any mcp tools"
    expected:
      - "src/mcp/handler.rs"
      - "src/mcp/server.rs"

  - id: "find-codeelement"
    prompt: "Find where CodeElement struct is defined"
    expected:
      - "src/db/models.rs"

  - id: "find-extractor"
    prompt: "How does LeanKG extract code elements? Find the extractor module."
    expected:
      - "src/indexer/extractor.rs"

  - id: "find-query-engine"
    prompt: "Find the graph query engine that handles get_dependencies"
    expected:
      - "src/graph/query.rs"
