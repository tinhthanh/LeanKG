<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeanKG Graph Viewer</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #header {
            background: #1a1a2e;
            color: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #header h1 { font-size: 1.2rem; }
        #header a { color: #4fc3f7; text-decoration: none; }
        #toolbar {
            background: #16213e;
            padding: 10px 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            background: #0f3460;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #16537e; }
        input {
            background: #1a1a2e;
            color: #fff;
            border: 1px solid #333;
            padding: 8px 12px;
            border-radius: 4px;
            width: 300px;
        }
        #mynetwork {
            width: 100vw;
            height: calc(100vh - 120px);
            background: #1a1a2e;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 1.5rem;
            display: none;
        }
        #error {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #e74c3c;
            color: #fff;
            padding: 15px 20px;
            border-radius: 4px;
            display: none;
            max-width: 400px;
        }
        #info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #27ae60;
            color: #fff;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>LeanKG Graph Viewer</h1>
        <span style="font-size: 0.9rem; opacity: 0.7;">CozoDB Graph Viewer</span>
    </div>
    <div id="toolbar">
        <button onclick="loadFullGraph()">Load Full Graph</button>
        <button onclick="loadFunctions()">Functions Only</button>
        <button onclick="loadImports()">Imports Only</button>
        <button onclick="loadCalls()">Calls Only</button>
        <input type="text" id="queryInput" placeholder="Datalog query (e.g., ?[a,b] := *relationships{type: 'calls', source_qualified: a, target_qualified: b})">
        <button onclick="runCustomQuery()">Run Query</button>
        <button onclick="fitGraph()">Fit</button>
    </div>
    <div id="mynetwork"></div>
    <div id="loading">Loading...</div>
    <div id="error"></div>
    <div id="info">Nodes: <span id="nodeCount">0</span> | Edges: <span id="edgeCount">0</span></div>

    <script>
        let network = null;
        let nodes = new vis.DataSet([]);
        let edges = new vis.DataSet([]);

        const API = '/api';

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function updateInfo() {
            document.getElementById('nodeCount').textContent = nodes.length;
            document.getElementById('edgeCount').textContent = edges.length;
        }

        async function runQuery(script) {
            const resp = await fetch(`${API}/text-query`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ script, params: {} })
            });
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            if (data.error) throw new Error(data.error);
            return data.result || [];
        }

        function initGraph() {
            const container = document.getElementById('mynetwork');
            network = new vis.Network(container, { nodes, edges }, {
                physics: { enabled: true, stabilization: { iterations: 100 } },
                nodes: { shape: 'dot', size: 15, color: { background: '#4fc3f7', border: '#fff' } },
                edges: { color: { color: '#555' }, arrows: 'to' }
            });
            network.fit();
        }

        function clearGraph() {
            nodes.clear();
            edges.clear();
        }

        function fitGraph() {
            if (network) network.fit();
        }

        async function loadFullGraph() {
            showLoading(true);
            clearGraph();
            try {
                // code_elements: qn(0), etype(1), name(2), file_path(3), line_start(4), line_end(5), lang(6), parent(7), metadata(8)
                const elements = await runQuery('?[qn, name, etype] := *code_elements[qn, etype, name, fp, ls, le, lang, parent, meta]');
                // relationships: src(0), tgt(1), type(2), metadata(3)
                const rels = await runQuery('?[src, tgt, type] := *relationships[src, tgt, type, md]');

                const nodeIds = new Set();
                elements.forEach(([qn, name, etype]) => {
                    if (qn) {
                        nodes.add({ id: qn, label: name || qn, title: `${etype}\n${qn}` });
                        nodeIds.add(qn);
                    }
                });

                rels.forEach(([src, tgt, type]) => {
                    if (src && tgt && nodeIds.has(src) && nodeIds.has(tgt)) {
                        edges.add({ from: src, to: tgt, label: type || '' });
                    }
                });

                updateInfo();
                network.fit();
            } catch (e) {
                showError(e.message);
            }
            showLoading(false);
        }

        async function loadFunctions() {
            showLoading(true);
            clearGraph();
            try {
                const funcs = await runQuery('?[qn, name] := *code_elements[qn, "function", name, fp, ls, le, lang, parent, meta]');
                funcs.forEach(([qn, name]) => {
                    if (qn) nodes.add({ id: qn, label: name || qn });
                });
                updateInfo();
                network.fit();
            } catch (e) {
                showError(e.message);
            }
            showLoading(false);
        }

        async function loadImports() {
            showLoading(true);
            clearGraph();
            try {
                const rels = await runQuery('?[src, tgt] := *relationships[src, tgt, "imports", md]');
                const nodeIds = new Set();
                rels.forEach(([src, tgt]) => {
                    if (src) { nodes.add({ id: src, label: src.split('::').pop() }); nodeIds.add(src); }
                    if (tgt) { nodes.add({ id: tgt, label: tgt.split('::').pop() }); nodeIds.add(tgt); }
                });
                rels.forEach(([src, tgt]) => {
                    if (src && tgt && nodeIds.has(src) && nodeIds.has(tgt)) {
                        edges.add({ from: src, to: tgt, label: 'imports' });
                    }
                });
                updateInfo();
                network.fit();
            } catch (e) {
                showError(e.message);
            }
            showLoading(false);
        }

        async function loadCalls() {
            showLoading(true);
            clearGraph();
            try {
                const rels = await runQuery('?[src, tgt] := *relationships[src, tgt, "calls", md]');
                const nodeIds = new Set();
                rels.forEach(([src, tgt]) => {
                    if (src) { nodes.add({ id: src, label: src.split('::').pop() }); nodeIds.add(src); }
                    if (tgt) { nodes.add({ id: tgt, label: tgt.split('::').pop() }); nodeIds.add(tgt); }
                });
                rels.forEach(([src, tgt]) => {
                    if (src && tgt && nodeIds.has(src) && nodeIds.has(tgt)) {
                        edges.add({ from: src, to: tgt, label: 'calls' });
                    }
                });
                updateInfo();
                network.fit();
            } catch (e) {
                showError(e.message);
            }
            showLoading(false);
        }

        async function runCustomQuery() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) { showError('Please enter a query'); return; }
            showLoading(true);
            clearGraph();
            try {
                const results = await runQuery(query);
                results.forEach(row => {
                    if (Array.isArray(row) && row.length >= 2) {
                        const [from, to, label] = row;
                        if (from && to) {
                            nodes.add({ id: from, label: from.split('::').pop() });
                            nodes.add({ id: to, label: to.split('::').pop() });
                            edges.add({ from, to, label: label || '' });
                        }
                    }
                });
                updateInfo();
                network.fit();
            } catch (e) {
                showError(e.message);
            }
            showLoading(false);
        }

        initGraph();
        loadFullGraph();
    </script>
</body>
</html>
